name: lezzetbul
description: Turkiye'nin en iyi restoran bulucu uygulamasi. Konumuna yakin en iyi restoranlari bul!
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  http: ^1.2.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  provider: ^6.1.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.3
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  sqflite: ^2.3.2
  path: ^1.9.0
  share_plus: ^7.2.2
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
